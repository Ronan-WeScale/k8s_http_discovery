apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-http-discovery.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-http-discovery.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
  selector:
    {{- include "k8s-http-discovery.selectorLabels" . | nindent 4 }}
